name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so `next build` succeeds without real secrets
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      WORD_API_BASE_URL: http://localhost:8000
      WORD_API_KEY: ci-placeholder
      NEXT_PUBLIC_COLLAB_WS_URL: ws://localhost:1234

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install collab-server deps
        run: npm ci --prefix collab-server

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
